<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Source de l'image OG</title>
<!--
  Source de site/assets/og.png (carte de partage social, 1200x630).
  Hors de site/ pour ne pas être publiée. Pour régénérer après un changement
  de version, de baseline ou du nombre de skills :

    python3 -m http.server 8099 --directory tools
    # puis, dans un navigateur en 1200x630 à dpr 1, capturer la page
    # et enregistrer le PNG dans site/assets/og.png

  Garder dpr 1 : à dpr 2 l'image passe de ~240 Ko à ~710 Ko sans gain visible
  chez les crawlers, qui affichent la carte autour de 600 px de large.
-->

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(63, 214, 242, 0.13), transparent 70%), #0a0e12;
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(63, 214, 242, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(63, 214, 242, 0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    -webkit-mask-image: radial-gradient(ellipse 70% 65% at 50% 25%, black, transparent 78%);
  }
  .frame {
    position: relative; height: 100%;
    padding: 68px 76px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .dot { width: 16px; height: 16px; background: #3fd6f2; box-shadow: 0 0 20px rgba(63, 214, 242, 0.9); }
  .name { font-size: 27px; font-weight: 700; color: #eef4f8; letter-spacing: 0.06em; }
  .badge {
    font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #7d8f9c;
    border: 1px solid #23303a; padding: 4px 11px; border-radius: 4px;
  }
  h1 {
    font-size: 68px; line-height: 1.08; font-weight: 700;
    color: #eef4f8; letter-spacing: -0.025em; max-width: 1000px;
  }
  h1 em { font-style: normal; color: #3fd6f2; }
  .lead { margin-top: 22px; font-size: 25px; line-height: 1.5; color: #8fa2b0; max-width: 860px; }
  .foot { display: flex; align-items: center; justify-content: space-between; }
  .facts {
    display: flex; gap: 26px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #7d8f9c;
  }
  .sep { color: #2a3844; }
  .url {
    font-family: 'JetBrains Mono', monospace; font-size: 19px; color: #3fd6f2;
    border: 1px solid rgba(63, 214, 242, 0.32); background: rgba(63, 214, 242, 0.07);
    padding: 9px 18px; border-radius: 100px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame">
    <div class="brand">
      <span class="dot"></span>
      <span class="name">FORGE</span>
      <span class="badge">PLUGIN CLAUDE CODE</span>
    </div>
    <div>
      <h1>Le pipeline de développement, <em>de la vision au commit</em>.</h1>
      <p class="lead">Des étapes courtes, validées une à une. Chaque étape produit un artefact qui alimente la suivante.</p>
    </div>
    <div class="foot">
      <div class="facts">
        <span>3 tracks symétriques</span><span class="sep">/</span>
        <span>25 skills</span><span class="sep">/</span>
        <span>Stack-agnostique</span>
      </div>
      <span class="url">forge.mustiere.fr</span>
    </div>
  </div>
</body>
</html>
