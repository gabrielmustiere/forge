# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    DataFixtures\:
        resource: '../fixtures'

    # Port de clone : une seule implémentation (git identique GitHub/GitLab), aliasée
    # explicitement pour l'autowiring. En test, l'id GitRepositoryCloner est remplacé par
    # un double (config/services_test.yaml) sans toucher cet alias.
    App\Service\Repository\RepositoryClonerInterface: '@App\Service\Repository\GitRepositoryCloner'

    # Ports de l'interview de cadrage (story 009), une implémentation chacun, aliasés pour
    # l'autowiring. En test, les ids concrets sont remplacés par des doubles (services_test.yaml).
    # L'ouverture de PR passe par un registry (tagged iterator), pas d'alias direct.
    App\Service\Interview\InterviewRunnerInterface: '@App\Service\Interview\ClaudeInterviewRunner'
    App\Service\Interview\BriefPusherInterface: '@App\Service\Interview\GitBriefPusher'

    # Extensions CommonMark pour le rendu du drawer (contenu de repos tiers).
    League\CommonMark\Extension\CommonMark\CommonMarkCoreExtension: ~
    League\CommonMark\Extension\GithubFlavoredMarkdownExtension: ~
    League\CommonMark\Extension\ExternalLink\ExternalLinkExtension: ~

    # Environnement GFM en mode sûr : `html_input: strip` retire tout HTML brut,
    # `allow_unsafe_links: false` neutralise les liens dangereux (javascript:…), et les
    # liens externes s'ouvrent en nouvel onglet avec rel="noopener noreferrer" (défaut de
    # l'extension) — le contenu vient d'un dépôt non maîtrisé.
    forge.markdown.environment:
        class: League\CommonMark\Environment\Environment
        arguments:
            $config:
                html_input: strip
                allow_unsafe_links: false
                external_link:
                    open_in_new_window: true
        calls:
            - [addExtension, ['@League\CommonMark\Extension\CommonMark\CommonMarkCoreExtension']]
            - [addExtension, ['@League\CommonMark\Extension\GithubFlavoredMarkdownExtension']]
            - [addExtension, ['@League\CommonMark\Extension\ExternalLink\ExternalLinkExtension']]

    League\CommonMark\MarkdownConverter:
        arguments:
            $environment: '@forge.markdown.environment'

    # Le filtre `markdown_to_html` passe par `twig.markdown.default` (consommé par le
    # MarkdownRuntime de twig/extra-bundle) : on le redéfinit pour qu'il s'appuie sur ce
    # converter sûr plutôt que sur le converter permissif par défaut du bundle.
    twig.markdown.default:
        class: Twig\Extra\Markdown\LeagueMarkdown
        arguments:
            $converter: '@League\CommonMark\MarkdownConverter'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
